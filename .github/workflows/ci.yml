name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install UI dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Type-check UI
        working-directory: frontend
        run: bun run check

      - name: Build UI
        working-directory: frontend
        run: bun run build

      - name: Run UI tests
        working-directory: frontend
        run: bun run test

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -shuffle=on ./...

      - name: Verify modules
        run: go mod verify

      - name: Verify go mod tidy
        run: go mod tidy && git diff --exit-code
