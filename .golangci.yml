version: "2"

linters:
  enable:
    - bodyclose
    - errcheck
    - gosec
    - govet
    - ineffassign
    - misspell
    - nilerr
    - revive
    - sqlclosecheck
    - staticcheck
    - unused

  settings:
    errcheck:
      exclude-functions:
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
        - (*).Close
        - fmt.Fprintf
        - fmt.Fprintln
        - (*github.com/hobeone/rss2go/internal/db/sqlite.Store).Close
        - rows.Close
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: var-naming
          disabled: true
