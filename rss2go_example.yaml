# Database location
db_path: "rss2go.db"

# Log level: debug, info, warn, error
log_level: "info"

# Polling settings
poll_interval: "1h"
poll_jitter: "1m"

# Crawler settings
crawler_pool_size: 5
crawler_timeout: "30s"

# Image settings
max_image_width: 600

# Mailer settings (SMTP)
#
# All settings can be overridden via environment variables with the
# RSS2GO_ prefix. For example:
#   export RSS2GO_SMTP_PASS="your-app-password"
#   export RSS2GO_SMTP_USER="you@gmail.com"
#
# Using environment variables is RECOMMENDED for sensitive values like
# smtp_pass to avoid storing credentials in plaintext config files.
#
# IMPORTANT: If you do store credentials here, ensure this file has
# restrictive permissions:  chmod 600 rss2go.yaml
smtp_server: "smtp.gmail.com"
smtp_port: 587
smtp_user: "YOUR USER NAME@gmail.com"
smtp_pass: "YOUR APP PASSWORD"
smtp_sender: "YOUR USER NAME@gmail.com"
